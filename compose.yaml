name: borgbackup-manager

services:
  borg-manager:
    image: borgbackup-manager:latest
    build: .
    container_name: borgbackup-manager
    hostname: bbm
    restart: unless-stopped
    ports:
      - "${BBM_HTTPS_PORT:-8443}:8443"
      - "${BBM_REPOSITORY_SSH_PORT:-2222}:2222"
    environment:
      BBM_HTTPS_PORT: ${BBM_HTTPS_PORT:-8443}
      BBM_DATA_PATH: ${BBM_DATA_PATH:-./data}
      BBM_REPOSITORY_PATH: ${BBM_REPOSITORY_PATH:-./repositories}
      BBM_REPOSITORY_PUBLIC_HOST: ${BBM_REPOSITORY_PUBLIC_HOST:?Set the address reachable by backup devices}
      BBM_REPOSITORY_SSH_PORT: ${BBM_REPOSITORY_SSH_PORT:-2222}
      BBM_TLS_HOSTS: ${BBM_TLS_HOSTS:-}
      BBM_SESSION_TTL_SECONDS: ${BBM_SESSION_TTL_SECONDS:-86400}
      BBM_SESSION_IDLE_TIMEOUT_SECONDS: ${BBM_SESSION_IDLE_TIMEOUT_SECONDS:-3600}
      BBM_BORG_UID: ${BBM_BORG_UID:-1000}
      BBM_BORG_GID: ${BBM_BORG_GID:-1000}
      BBM_STORAGE_GUARD_ENABLED: ${BBM_STORAGE_GUARD_ENABLED:-1}
      BBM_STORAGE_GUARD_THRESHOLD_PERCENT: ${BBM_STORAGE_GUARD_THRESHOLD_PERCENT:-95}
      BBM_HEALTH_REQUIRE_SSHD: ${BBM_HEALTH_REQUIRE_SSHD:-1}
      BBM_LOG_MAX_BYTES: ${BBM_LOG_MAX_BYTES:-10485760}
      BBM_LOG_ROTATIONS: ${BBM_LOG_ROTATIONS:-5}
      BBM_DEBUG_LOG_LEVEL: ${BBM_DEBUG_LOG_LEVEL:-WARNING}
      BBM_TLS_CERT_FILE: ${BBM_TLS_CERT_FILE:-/data/tls/fullchain.pem}
      BBM_TLS_KEY_FILE: ${BBM_TLS_KEY_FILE:-/data/tls/privkey.pem}
      BBM_COMMAND_TIMEOUT: ${BBM_COMMAND_TIMEOUT:-86400}
      BBM_REPOSITORY_SIZE_AFTER_RUN: ${BBM_REPOSITORY_SIZE_AFTER_RUN:-1}
      BBM_MAX_PARALLEL_RUNS: ${BBM_MAX_PARALLEL_RUNS:-0}
      BBM_APPEARANCE: ${BBM_APPEARANCE:-auto}
      BBM_SESSION_COOKIE_NAME: ${BBM_SESSION_COOKIE_NAME:-bbm_session_v2}
      BBM_SESSION_COOKIE_SECURE: ${BBM_SESSION_COOKIE_SECURE:-always}
      BBM_TRUSTED_PROXY_CIDRS: ${BBM_TRUSTED_PROXY_CIDRS:-127.0.0.1/32,::1/128}
      BBM_LOGIN_RATE_WINDOW_SECONDS: ${BBM_LOGIN_RATE_WINDOW_SECONDS:-300}
      BBM_LOGIN_RATE_BLOCK_SECONDS: ${BBM_LOGIN_RATE_BLOCK_SECONDS:-900}
      BBM_LOGIN_RATE_MAX_PER_IP: ${BBM_LOGIN_RATE_MAX_PER_IP:-20}
      BBM_LOGIN_RATE_MAX_PER_IP_USER: ${BBM_LOGIN_RATE_MAX_PER_IP_USER:-5}
      BBM_SECURITY_EVENT_RETENTION_DAYS: ${BBM_SECURITY_EVENT_RETENTION_DAYS:-90}
      BBM_SECURITY_EVENT_MAX_ROWS: ${BBM_SECURITY_EVENT_MAX_ROWS:-10000}
      BBM_BACKUP_MAX_FILE_BYTES: ${BBM_BACKUP_MAX_FILE_BYTES:-268435456}
      BBM_BACKUP_MAX_UNCOMPRESSED_BYTES: ${BBM_BACKUP_MAX_UNCOMPRESSED_BYTES:-1073741824}
      BBM_BACKUP_MAX_ENTRIES: ${BBM_BACKUP_MAX_ENTRIES:-5000}
      BBM_BACKUP_MAX_COMPRESSION_RATIO: ${BBM_BACKUP_MAX_COMPRESSION_RATIO:-250}
      TZ: ${TZ:-Europe/Berlin}
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${BBM_DATA_PATH:-./data}:/data
      - ${BBM_REPOSITORY_PATH:-./repositories}:/repositories
      - ./.env:/run/bbm-host.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('https://127.0.0.1:8443/api/ready', context=__import__('ssl')._create_unverified_context(), timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
