name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install locked runtime dependencies
        run: python -m pip install --require-hashes -r requirements.txt

      - name: Install test dependencies
        run: python -m pip install pytest==9.0.2 httpx==0.28.1 pytest-asyncio==1.4.0

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Run release checks and tests
        run: bash scripts/release-check.sh

  container-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: test
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Build container image
        run: docker build --tag borgbackup-manager-ci:${{ github.sha }} .
